  <!-- Region Labels -->
  <text x="310" y="180" fill="#ffffff" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle" opacity="0.8" letter-spacing="3">NORTHERN</text>
  <text x="420" y="290" fill="#ffffff" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle" opacity="0.8" letter-spacing="3">EASTERN</text>
  <text x="140" y="320" fill="#ffffff" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle" opacity="0.8" letter-spacing="3">WESTERN</text>
  <text x="340" y="340" fill="#ffffff" font-family="Georgia, serif" font-size="16" font-weight="700" text-anchor="middle" opacity="0.8" letter-spacing="3">CENTRAL</text>

  <!-- Country Name -->
  <text x="300" y="480" fill="#ffffff" font-family="Georgia, serif" font-size="22" font-weight="700" text-anchor="middle" opacity="0.6" letter-spacing="8">UGANDA</text>
</svg>
